name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Esto se ejecutará cada vez que hagas un push a main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install and Build
        run: |
          cd admin
          npm install
          npm run build
        
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./admin/dist # Aquí le decimos que suba lo que está en la carpeta dist